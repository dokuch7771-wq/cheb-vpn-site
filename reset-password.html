<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сброс пароля — CHEB VPN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080C10; --bg2: #0D1318; --surface: #1A2430;
    --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.12);
    --accent: #00D4FF; --accent-dim: rgba(0,212,255,0.08);
    --text: #F0F4F8; --text2: #8A9BAD; --text3: #4A5A6A;
    --green: #00E584; --green-dim: rgba(0,229,132,0.08);
    --red: #FF5252;
    --font-h: 'Unbounded', sans-serif; --font-b: 'Onest', sans-serif;
    --r: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-b); font-size: 16px;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4; z-index: 0;
  }
  .wrap {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 20px; padding: 40px 36px;
    width: 100%; max-width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .logo {
    font-family: var(--font-h); font-size: 18px; color: var(--accent);
    text-decoration: none; display: block; margin-bottom: 28px; text-align: center;
  }
  h1 { font-family: var(--font-h); font-size: 20px; margin-bottom: 8px; text-align: center; }
  .sub { color: var(--text2); font-size: 14px; text-align: center; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .field input {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border2); border-radius: var(--r);
    padding: 11px 14px; color: var(--text);
    font-family: var(--font-b); font-size: 15px; outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; background: var(--accent); color: #080C10;
    border: none; border-radius: var(--r);
    padding: 13px; font-family: var(--font-h); font-size: 14px;
    font-weight: 700; cursor: pointer; margin-top: 4px;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn:hover:not(:disabled) { opacity: 0.9; }
  .error {
    display: none; background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3);
    border-radius: var(--r); padding: 10px 14px;
    color: var(--red); font-size: 13px; margin-bottom: 16px;
  }
  .success {
    display: none; background: var(--green-dim); border: 1px solid rgba(0,229,132,0.3);
    border-radius: var(--r); padding: 14px;
    color: var(--green); font-size: 14px; text-align: center; margin-bottom: 16px;
  }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(8,12,16,0.3); border-top-color: #080C10;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .back-link {
    display: block; text-align: center; margin-top: 20px;
    color: var(--text2); font-size: 13px; text-decoration: none;
  }
  .back-link:hover { color: var(--accent); }
  #invalid-token {
    display: none; text-align: center;
  }
  #invalid-token .icon { font-size: 48px; margin-bottom: 16px; }
  #invalid-token p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="/" class="logo">CHEB VPN</a>

  <!-- Invalid token state -->
  <div id="invalid-token">
    <div class="icon">⚠️</div>
    <h1>Ссылка недействительна</h1>
    <p>Токен истёк или уже использован.<br>Запросите новую ссылку для сброса пароля.</p>
    <a href="/dashboard.html#login" class="btn" style="display:inline-block;text-decoration:none;text-align:center;margin-top:8px;">Войти</a>
  </div>

  <!-- Reset form -->
  <div id="reset-form">
    <h1>Новый пароль</h1>
    <p class="sub">Придумайте надёжный пароль для вашего аккаунта</p>

    <div class="error" id="reset-error"></div>
    <div class="success" id="reset-success"></div>

    <div class="field">
      <label>Новый пароль</label>
      <input type="password" id="new-pass" placeholder="минимум 8 символов" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <div class="field">
      <label>Повторите пароль</label>
      <input type="password" id="new-pass2" placeholder="повторите пароль" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn" id="btn-reset" onclick="doReset()">Сохранить пароль</button>
  </div>

  <a href="/dashboard.html#login" class="back-link">← Вернуться ко входу</a>
</div>

<script>
  const API = '';
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('invalid-token').style.display = 'block';
  }

  async function doReset() {
    const pass = document.getElementById('new-pass').value;
    const pass2 = document.getElementById('new-pass2').value;
    const errEl = document.getElementById('reset-error');
    const successEl = document.getElementById('reset-success');
    const btn = document.getElementById('btn-reset');
    errEl.style.display = 'none';
    successEl.style.display = 'none';

    if (pass.length < 8) {
      errEl.textContent = 'Пароль должен быть минимум 8 символов';
      errEl.style.display = 'block'; return;
    }
    if (pass !== pass2) {
      errEl.textContent = 'Пароли не совпадают';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Сохраняем...';

    try {
      const res = await fetch(API + '/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: pass }),
      });
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 400 && data.detail && data.detail.includes('Токен')) {
          document.getElementById('reset-form').style.display = 'none';
          document.getElementById('invalid-token').style.display = 'block';
          return;
        }
        throw new Error(data.detail || 'Ошибка сброса пароля');
      }
      // Save token and redirect
      if (data.access_token) {
        localStorage.setItem('chebvpn_token', data.access_token);
      }
      document.getElementById('reset-form').style.display = 'none';
      successEl.innerHTML = '✓ Пароль успешно изменён!<br><br><a href="/dashboard.html#dashboard" style="color:var(--accent);">Перейти в кабинет →</a>';
      successEl.style.display = 'block';
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Сохранить пароль';
    }
  }
</script>
</body>
</html>
